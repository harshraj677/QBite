name: qbite
description: "QBite — customer-facing food ordering & delivery app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Networking
  dio: ^5.7.0

  # Secure local storage (tokens) — dependency configured, no auth logic wired yet
  flutter_secure_storage: ^9.2.2

  # Immutable models / JSON codegen — no models generated yet
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Environment variable loading (flavors: development/staging/production)
  flutter_dotenv: ^5.2.1

  # Typography
  google_fonts: ^6.3.3

  # Icons
  cupertino_icons: ^1.0.8

  # Logging
  logger: ^2.7.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation toolchain
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true

  # Per-flavor env files (see lib/config/env.dart, lib/main_*.dart).
  # Not committed (see .gitignore) — copy from .env.example first, per
  # README.md / scripts/setup.sh.
  assets:
    - .env.development
    - .env.staging
    - .env.production
