  #     dockerfile: docker/backend.Dockerfile
  #   container_name: qbite-backend
  #   env_file: apps/backend/.env
  #   ports:
  #     - "4000:4000"
  #   depends_on:
  #     - mongo
  #     - redis

  # admin:
  #   build:
  #     context: .
  #     dockerfile: docker/admin.Dockerfile
  #   container_name: qbite-admin
  #   env_file: apps/admin/.env.local
