# QBite — local development compose (placeholder)
#
# Not yet exercised end-to-end. Application services (backend/admin)
# are commented out until their Dockerfiles are validated in a later
# phase — bringing up "mongo" and "redis" alone is enough to support
# local development against apps/backend running natively (npm run dev)
# in the meantime.

services:
  mongo:
    image: mongo:7
    container_name: qbite-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - qbite-mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: qbite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - qbite-redis-data:/data

  # backend:
